<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Feed Instagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #FDFCFA;
    --bg2: #F4EFE8;
    --bg3: #E8DDD0;
    --navy: #1B2E3C;
    --navy2: #2C4A5E;
    --gold: #C49A3C;
    --terra: #8F3F27;
    --text: #1B2E3C;
    --text2: #5A6E78;
    --text3: #8B9EA8;
    --border: #C8D5DB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    align-items: start;
  }

  /* CALENDRIER */
  .calendar-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--navy);
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-nav button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    color: var(--text2);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .month-nav button:hover { background: var(--bg2); border-color: var(--navy2); }

  .month-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    min-width: 120px;
    text-align: center;
  }

  .calendar-grid {
    padding: 16px 20px 20px;
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }

  .day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 0;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    min-height: 72px;
    border-radius: 8px;
    padding: 6px;
    background: var(--bg);
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .day-cell.other-month { opacity: 0.3; }

  .day-cell.today {
    border-color: var(--gold);
    background: #fdf8ee;
  }

  .day-cell.drag-over {
    border-color: var(--navy2);
    background: #eef3f7;
  }

  .day-number {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .day-cell.today .day-number { color: var(--gold); font-weight: 600; }

  .post-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    margin-bottom: 3px;
    cursor: grab;
    font-size: 10px;
    font-weight: 500;
    color: var(--navy);
    transition: all 0.15s;
    overflow: hidden;
  }

  .post-chip:hover { border-color: var(--navy2); box-shadow: 0 1px 4px rgba(27,46,60,0.1); }
  .post-chip:active { cursor: grabbing; opacity: 0.7; }

  .post-chip.dragging { opacity: 0.4; }

  .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chip-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90px;
  }

  /* FEED PREVIEW */
  .feed-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: sticky;
    top: 24px;
  }

  .phone-frame {
    padding: 16px;
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .phone {
    width: 240px;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(27,46,60,0.15);
    border: 1px solid var(--border);
  }

  .phone-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .insta-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
  }

  .phone-icons { display: flex; gap: 10px; }
  .phone-icon { width: 16px; height: 16px; color: var(--navy); opacity: 0.7; }

  .profile-strip {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--bg2);
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terra), var(--gold));
    flex-shrink: 0;
  }

  .profile-info {
    flex: 1;
  }

  .profile-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--navy);
  }

  .profile-sub {
    font-size: 9px;
    color: var(--text3);
    margin-top: 1px;
  }

  .feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--bg2);
  }

  .feed-cell {
    aspect-ratio: 1;
    background: var(--bg3);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .feed-cell:hover { opacity: 0.85; }

  .feed-cell.empty {
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-icon {
    font-size: 14px;
    opacity: 0.2;
  }

  .feed-cell-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    text-align: center;
    position: relative;
  }

  .feed-cat-icon {
    font-size: 16px;
    margin-bottom: 2px;
  }

  .feed-cat-label {
    font-size: 7px;
    font-weight: 500;
    color: white;
    line-height: 1.2;
    text-align: center;
  }

  .feed-date-badge {
    position: absolute;
    bottom: 3px;
    right: 3px;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 7px;
    padding: 1px 3px;
    border-radius: 2px;
    font-weight: 500;
  }

  /* LISTE DE POSTS */
  .posts-section {
    margin-top: 24px;
  }

  .posts-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .posts-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--navy);
  }

  .add-post-btn {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .add-post-btn:hover { background: var(--navy2); }

  .posts-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .post-row {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: grab;
    transition: all 0.15s;
  }

  .post-row:hover { border-color: var(--navy2); box-shadow: 0 2px 8px rgba(27,46,60,0.08); }
  .post-row:active { cursor: grabbing; }
  .post-row.unscheduled { border-style: dashed; background: var(--bg); }

  .post-color-bar {
    width: 4px;
    height: 36px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .post-info { flex: 1; min-width: 0; }

  .post-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }

  .post-cat-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .post-format {
    font-size: 10px;
    color: var(--text3);
  }

  .post-date {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
    white-space: nowrap;
  }

  .post-date.unset {
    color: var(--text3);
    font-style: italic;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27,46,60,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(27,46,60,0.2);
    transform: translateY(8px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--navy);
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--navy);
    background: var(--bg);
    transition: border-color 0.15s;
    outline: none;
  }

  .form-input:focus, .form-select:focus { border-color: var(--navy2); background: white; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--text2);
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--navy2); color: var(--navy); }

  .btn-save {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }

  .btn-save:hover { background: var(--navy2); }

  .btn-delete {
    background: none;
    border: 1px solid #fbd4cc;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--terra);
    transition: all 0.15s;
    margin-right: auto;
  }

  .btn-delete:hover { background: #fef5f3; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .feed-panel { position: static; }
  }
</style>
</head>
<body>

<h1>Mon Feed Instagram</h1>
<p class="subtitle">Planifiez vos posts sur le calendrier. Le feed se met à jour automatiquement.</p>

<div class="layout">
  <div>
    <!-- CALENDRIER -->
    <div class="calendar-panel">
      <div class="panel-header">
        <span class="panel-title">Calendrier éditorial</span>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <span class="month-label" id="monthLabel"></span>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="calendar-grid">
        <div class="day-headers">
          <div class="day-header">Lun</div>
          <div class="day-header">Mar</div>
          <div class="day-header">Mer</div>
          <div class="day-header">Jeu</div>
          <div class="day-header">Ven</div>
          <div class="day-header">Sam</div>
          <div class="day-header">Dim</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
    </div>

    <!-- LISTE DES POSTS -->
    <div class="posts-section">
      <div class="posts-header">
        <span class="posts-title">Tous les posts</span>
        <button class="add-post-btn" onclick="openModal()">+ Nouveau post</button>
      </div>
      <div class="posts-list" id="postsList"></div>
    </div>
  </div>

  <!-- FEED PREVIEW -->
  <div class="feed-panel">
    <div class="panel-header">
      <span class="panel-title">Aperçu du feed</span>
    </div>
    <div class="phone-frame">
      <div class="phone">
        <div class="phone-header">
          <span class="insta-logo">Instagram</span>
          <div class="phone-icons">
            <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </div>
        </div>
        <div class="profile-strip">
          <div class="avatar"></div>
          <div class="profile-info">
            <div class="profile-name">votre_entreprise</div>
            <div class="profile-sub">Menuiserie aluminium</div>
          </div>
        </div>
        <div class="feed-grid" id="feedGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nouveau post</div>
    <div class="form-group">
      <label class="form-label">Titre du post</label>
      <input class="form-input" id="inputTitle" placeholder="ex : Réalisation baies vitrantes Marseille">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-select" id="inputCat">
          <option value="realisation">Réalisation terminée</option>
          <option value="coulisses">Coulisses</option>
          <option value="produit">Produit focus</option>
          <option value="temoignage">Témoignage client</option>
          <option value="conseil">Conseil technique</option>
          <option value="avantapres">Avant/après</option>
          <option value="equipe">Équipe</option>
          <option value="epingle">Post épinglé</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Format</label>
        <select class="form-select" id="inputFormat">
          <option value="Post">Post</option>
          <option value="Carrousel">Carrousel</option>
          <option value="Réel">Réel</option>
          <option value="Story">Story</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Date de publication</label>
      <input class="form-input" type="date" id="inputDate">
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" onclick="deletePost()" style="display:none">Supprimer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="savePost()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  realisation: { label: 'Réalisation', color: '#2C4A5E', bg: '#eef3f7', icon: '🏠' },
  coulisses:   { label: 'Coulisses',   color: '#5A6E78', bg: '#f0f3f4', icon: '📸' },
  produit:     { label: 'Produit',     color: '#8F3F27', bg: '#fdf0ec', icon: '🪟' },
  temoignage:  { label: 'Témoignage',  color: '#C49A3C', bg: '#fdf8ee', icon: '⭐' },
  conseil:     { label: 'Conseil',     color: '#4E7A72', bg: '#eef5f4', icon: '💡' },
  avantapres:  { label: 'Avant/après', color: '#6B4F8A', bg: '#f3eef8', icon: '✨' },
  equipe:      { label: 'Équipe',      color: '#1B2E3C', bg: '#eef0f2', icon: '👥' },
  epingle:     { label: 'Épinglé',     color: '#C49A3C', bg: '#fdf8ee', icon: '📌' },
};

let posts = [
  { id: 1, title: 'Qui sommes-nous', cat: 'epingle', format: 'Post', date: null },
  { id: 2, title: 'Nos services', cat: 'epingle', format: 'Post', date: null },
  { id: 3, title: 'Zone d\'intervention', cat: 'epingle', format: 'Post', date: null },
  { id: 4, title: 'Réalisation n°1', cat: 'realisation', format: 'Post', date: null },
  { id: 5, title: 'Réalisation n°2', cat: 'realisation', format: 'Post', date: null },
  { id: 6, title: 'Réalisation n°3', cat: 'realisation', format: 'Post', date: null },
  { id: 7, title: 'L\'humain derrière', cat: 'equipe', format: 'Post', date: null },
  { id: 8, title: 'Avis client', cat: 'temoignage', format: 'Post', date: null },
  { id: 9, title: 'Chantier en cours', cat: 'coulisses', format: 'Post', date: null },
  { id: 10, title: 'Réel problématique 1', cat: 'conseil', format: 'Réel', date: null },
  { id: 11, title: 'Réel problématique 2', cat: 'conseil', format: 'Réel', date: null },
  { id: 12, title: 'Réel problématique 3', cat: 'conseil', format: 'Réel', date: null },
];

let nextId = 13;
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();
let editingId = null;
let dragPostId = null;

function formatDate(d) {
  if (!d) return null;
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function dateToKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderCalendar() {
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('monthLabel').textContent = `${months[currentMonth]} ${currentYear}`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay();
  if (startDow === 0) startDow = 7;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const today = new Date();
  const todayKey = dateToKey(today.getFullYear(), today.getMonth(), today.getDate());

  const postsByDate = {};
  posts.forEach(p => { if (p.date) { if (!postsByDate[p.date]) postsByDate[p.date] = []; postsByDate[p.date].push(p); } });

  let cells = [];
  for (let i = startDow - 2; i >= 0; i--) cells.push({ day: daysInPrev - i, other: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, other: false });
  while (cells.length % 7 !== 0) cells.push({ day: cells.length - daysInMonth - (startDow - 1) + 1, other: true });

  cells.forEach(({ day, other }) => {
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (other ? ' other-month' : '');

    const key = other ? null : dateToKey(currentYear, currentMonth, day);
    if (key === todayKey) cell.classList.add('today');

    cell.innerHTML = `<div class="day-number">${day}</div>`;

    if (key && postsByDate[key]) {
      postsByDate[key].forEach(p => {
        const c = CATS[p.cat];
        const chip = document.createElement('div');
        chip.className = 'post-chip';
        chip.draggable = true;
        chip.dataset.postId = p.id;
        chip.innerHTML = `<span class="chip-dot" style="background:${c.color}"></span><span class="chip-text">${p.title}</span>`;
        chip.addEventListener('dragstart', e => { dragPostId = p.id; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
        chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); dragPostId = null; });
        chip.addEventListener('click', e => { e.stopPropagation(); openModal(p.id); });
        cell.appendChild(chip);
      });
    }

    if (key && !other) {
      cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over');
        if (dragPostId !== null) {
          const p = posts.find(x => x.id == dragPostId);
          if (p) { p.date = key; render(); }
        }
      });
    }

    grid.appendChild(cell);
  });
}

function renderFeed() {
  const grid = document.getElementById('feedGrid');
  grid.innerHTML = '';

  const scheduled = posts.filter(p => p.date).sort((a, b) => a.date.localeCompare(b.date));
  const pinned = posts.filter(p => p.cat === 'epingle' && !p.date);
  const display = [...pinned, ...scheduled].slice(0, 12);

  for (let i = 0; i < 12; i++) {
    const cell = document.createElement('div');
    cell.className = 'feed-cell';
    const p = display[i];
    if (p) {
      const c = CATS[p.cat];
      cell.style.background = c.color;
      cell.innerHTML = `
        <div class="feed-cell-inner">
          <div class="feed-cat-icon">${c.icon}</div>
          <div class="feed-cat-label">${p.title.substring(0, 20)}</div>
          ${p.date ? `<div class="feed-date-badge">${p.date.slice(8)}.${p.date.slice(5,7)}</div>` : ''}
        </div>`;
      cell.addEventListener('click', () => openModal(p.id));
    } else {
      cell.classList.add('empty');
      cell.innerHTML = '<div class="empty-icon">+</div>';
      cell.addEventListener('click', openModal);
    }
    grid.appendChild(cell);
  }
}

function renderPostsList() {
  const list = document.getElementById('postsList');
  list.innerHTML = '';

  const scheduled = posts.filter(p => p.date).sort((a, b) => a.date.localeCompare(b.date));
  const unscheduled = posts.filter(p => !p.date);
  const all = [...scheduled, ...unscheduled];

  all.forEach(p => {
    const c = CATS[p.cat];
    const row = document.createElement('div');
    row.className = 'post-row' + (!p.date ? ' unscheduled' : '');
    row.draggable = true;
    row.innerHTML = `
      <div class="post-color-bar" style="background:${c.color}"></div>
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-meta">
          <span class="post-cat-badge" style="background:${c.bg};color:${c.color}">${c.label}</span>
          <span class="post-format">${p.format}</span>
        </div>
      </div>
      <div class="post-date ${!p.date ? 'unset' : ''}">${p.date ? formatDate(p.date) : 'Non planifié'}</div>`;
    row.addEventListener('click', () => openModal(p.id));
    list.appendChild(row);
  });
}

function render() {
  renderCalendar();
  renderFeed();
  renderPostsList();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const btnDelete = document.getElementById('btnDelete');

  if (editingId) {
    const p = posts.find(x => x.id == editingId);
    title.textContent = 'Modifier le post';
    document.getElementById('inputTitle').value = p.title;
    document.getElementById('inputCat').value = p.cat;
    document.getElementById('inputFormat').value = p.format;
    document.getElementById('inputDate').value = p.date || '';
    btnDelete.style.display = 'block';
  } else {
    title.textContent = 'Nouveau post';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputCat').value = 'realisation';
    document.getElementById('inputFormat').value = 'Post';
    document.getElementById('inputDate').value = '';
    btnDelete.style.display = 'none';
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function savePost() {
  const title = document.getElementById('inputTitle').value.trim();
  if (!title) return;
  const cat = document.getElementById('inputCat').value;
  const format = document.getElementById('inputFormat').value;
  const date = document.getElementById('inputDate').value || null;

  if (editingId) {
    const p = posts.find(x => x.id == editingId);
    p.title = title; p.cat = cat; p.format = format; p.date = date;
  } else {
    posts.push({ id: nextId++, title, cat, format, date });
  }
  closeModal();
  render();
}

function deletePost() {
  if (!editingId) return;
  posts = posts.filter(p => p.id !== editingId);
  closeModal();
  render();
}

render();
</script>
</body>
</html>
